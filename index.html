<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚠️ SYSTEM BREACH</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none;
    }

    body {
      background: #0a0a0a;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      user-select: none;
    }

    /* glitch background layers */
    .glitch-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: 
        repeating-linear-gradient(0deg, 
          rgba(0, 255, 0, 0.03) 0px, 
          rgba(0, 255, 0, 0.03) 2px, 
          transparent 2px, 
          transparent 6px
        ),
        radial-gradient(circle at 30% 40%, #0d1f0d, #000000);
      z-index: 0;
      animation: scan 8s linear infinite;
    }

    @keyframes scan {
      0% { background-position: 0 0; }
      100% { background-position: 0 100%; }
    }

    /* main container */
    .hack-container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 900px;
      width: 100%;
      animation: flicker 3s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      3% { opacity: 0.3; }
      6% { opacity: 1; }
      7% { opacity: 0.2; }
      8% { opacity: 1; }
      9% { opacity: 0.5; }
      10% { opacity: 1; }
    }

    /* main hacked text */
    .hacked-text {
      font-size: clamp(3.5rem, 15vw, 8rem);
      font-weight: 900;
      color: #00ff41;
      text-shadow: 
        0 0 10px #00ff41,
        0 0 20px #00ff41,
        0 0 40px #00ff41,
        0 0 80px #00ff41,
        0 0 120px #00ff4133;
      letter-spacing: 8px;
      animation: glitch 1.8s infinite;
      position: relative;
      display: inline-block;
      padding: 0.2em 0.5em;
      border: 2px solid #00ff41;
      border-radius: 8px;
      background: rgba(0, 255, 65, 0.05);
      backdrop-filter: blur(2px);
      box-shadow: inset 0 0 60px #00ff4122, 0 0 60px #00ff4133;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-3px, 3px); }
      40% { transform: translate(3px, -3px); }
      60% { transform: translate(-2px, -2px); }
      80% { transform: translate(2px, 2px); }
      100% { transform: translate(0); }
    }

    .hacked-text::before,
    .hacked-text::after {
      content: "⚠ YOU ARE HACKED ⚠";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.7;
      pointer-events: none;
    }

    .hacked-text::before {
      color: #ff0040;
      z-index: -1;
      transform: translate(-4px, -2px);
      animation: glitch-before 2.2s infinite;
    }

    .hacked-text::after {
      color: #00ccff;
      z-index: -2;
      transform: translate(4px, 2px);
      animation: glitch-after 2.5s infinite;
    }

    @keyframes glitch-before {
      0% { clip-path: inset(0 0 0 0); }
      10% { clip-path: inset(20% 0 60% 0); }
      20% { clip-path: inset(50% 0 10% 0); }
      30% { clip-path: inset(10% 0 70% 0); }
      40% { clip-path: inset(80% 0 0 0); }
      50% { clip-path: inset(0 0 0 0); }
    }

    @keyframes glitch-after {
      0% { clip-path: inset(0 0 0 0); }
      15% { clip-path: inset(70% 0 10% 0); }
      30% { clip-path: inset(30% 0 50% 0); }
      45% { clip-path: inset(60% 0 20% 0); }
      60% { clip-path: inset(0 0 0 0); }
    }

    /* sub text */
    .sub-text {
      color: #00cc66;
      font-size: 1.2rem;
      margin-top: 2rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      animation: blink 1.2s step-end infinite;
      text-shadow: 0 0 20px #00ff4188;
      background: rgba(0, 0, 0, 0.7);
      padding: 0.8rem 2rem;
      display: inline-block;
      border: 1px solid #00ff41;
      border-radius: 40px;
      backdrop-filter: blur(4px);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* matrix rain (canvas) */
    #matrix-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      pointer-events: none;
      opacity: 0.25;
    }

    /* glitch overlay lines */
    .glitch-lines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 3px,
          rgba(0, 255, 0, 0.02) 3px,
          rgba(0, 255, 0, 0.02) 4px
        );
      animation: glitch-lines 0.15s infinite;
    }

    @keyframes glitch-lines {
      0% { transform: translateY(0); }
      100% { transform: translateY(4px); }
    }

    /* random noise overlay */
    .noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 3;
      pointer-events: none;
      opacity: 0.08;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc0IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMSIvPjwvc3ZnPg==');
      animation: noiseMove 0.8s steps(4) infinite;
    }

    @keyframes noiseMove {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-5px, 5px); }
      50% { transform: translate(5px, -5px); }
      75% { transform: translate(-3px, 3px); }
      100% { transform: translate(0, 0); }
    }

    /* permission toast */
    .perm-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(0, 20, 0, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid #00ff41;
      border-radius: 60px;
      padding: 0.8rem 2rem;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 0 40px #00ff4133;
      animation: toastPulse 2s infinite;
      white-space: nowrap;
    }

    @keyframes toastPulse {
      0%, 100% { box-shadow: 0 0 20px #00ff4122; }
      50% { box-shadow: 0 0 60px #00ff4166; }
    }

    .perm-toast i {
      font-size: 1.2rem;
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* responsive */
    @media (max-width: 600px) {
      .hacked-text {
        font-size: 2.8rem;
        letter-spacing: 4px;
        padding: 0.2em 0.3em;
      }
      .sub-text {
        font-size: 0.8rem;
        padding: 0.6rem 1.2rem;
        letter-spacing: 3px;
      }
      .perm-toast {
        font-size: 0.7rem;
        padding: 0.6rem 1.2rem;
        gap: 10px;
        white-space: normal;
        flex-wrap: wrap;
        justify-content: center;
        width: 90%;
      }
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="glitch-bg"></div>
  <canvas id="matrix-canvas"></canvas>
  <div class="glitch-lines"></div>
  <div class="noise"></div>

  <!-- Main content -->
  <div class="hack-container">
    <div class="hacked-text">⚠ YOU ARE HACKED ⚠</div>
    <div class="sub-text">
      <i class="fas fa-skull" style="margin-right: 12px;"></i>
      system compromised
      <i class="fas fa-skull" style="margin-left: 12px;"></i>
    </div>
  </div>

  <!-- Permission toast -->
  <div class="perm-toast" id="permToast">
    <i class="fas fa-circle-notch"></i>
    <span id="permStatus">⏳ requesting permissions ...</span>
    <i class="fas fa-shield-alt" style="color: #00ccff;"></i>
  </div>

  <script>
    // ---------- MATRIX RAIN (canvas) ----------
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, columns, drops;

    function resizeMatrix() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      columns = Math.floor(width / 18);
      drops = Array(columns).fill(1);
    }
    resizeMatrix();
    window.addEventListener('resize', resizeMatrix);

    const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%^&*()_+{}:<>?~";

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = '#00ff41';
      ctx.font = '16px monospace';
      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * 18, drops[i] * 18);
        if (drops[i] * 18 > height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }
    setInterval(drawMatrix, 70);

    // ---------- SOUND (hacking / glitch effect) ----------
    function playHackSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // glitchy noise
        const bufferSize = audioCtx.sampleRate * 0.8;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          // glitchy square + noise
          const t = i / audioCtx.sampleRate;
          const freq = 80 + Math.sin(t * 30) * 40;
          const val = Math.sin(t * freq * Math.PI * 2) * 0.3;
          const noise = (Math.random() * 2 - 1) * 0.15;
          data[i] = val + noise + Math.sin(t * 180) * 0.1;
          // envelope
          data[i] *= (1 - t / 0.8);
        }
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        const gain = audioCtx.createGain();
        gain.gain.value = 0.25;
        source.connect(gain);
        gain.connect(audioCtx.destination);
        source.start();
        source.stop(audioCtx.currentTime + 0.8);

        // second glitch burst
        setTimeout(() => {
          const buf2 = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
          const d2 = buf2.getChannelData(0);
          for (let i = 0; i < d2.length; i++) {
            d2[i] = (Math.random() * 2 - 1) * 0.5 * (1 - i / d2.length);
          }
          const src2 = audioCtx.createBufferSource();
          src2.buffer = buf2;
          const g2 = audioCtx.createGain();
          g2.gain.value = 0.15;
          src2.connect(g2);
          g2.connect(audioCtx.destination);
          src2.start();
          src2.stop(audioCtx.currentTime + 0.3);
        }, 300);

        // third — high pitch sweep
        setTimeout(() => {
          const buf3 = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
          const d3 = buf3.getChannelData(0);
          for (let i = 0; i < d3.length; i++) {
            const t = i / audioCtx.sampleRate;
            d3[i] = Math.sin(t * 600 * Math.PI * 2) * 0.08 * (1 - t / 0.5);
          }
          const src3 = audioCtx.createBufferSource();
          src3.buffer = buf3;
          const g3 = audioCtx.createGain();
          g3.gain.value = 0.1;
          src3.connect(g3);
          g3.connect(audioCtx.destination);
          src3.start();
          src3.stop(audioCtx.currentTime + 0.5);
        }, 600);
      } catch (e) {
        console.log('Audio not available');
      }
    }

    // play sound on load and periodically
    playHackSound();
    setInterval(playHackSound, 4000);

    // ---------- PERMISSIONS (camera, mic, location, notification) ----------
    const permStatus = document.getElementById('permStatus');

    async function requestAllPermissions() {
      const perms = [
        { name: 'camera', method: () => navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } }) },
        { name: 'microphone', method: () => navigator.mediaDevices.getUserMedia({ audio: true }) },
        { name: 'location', method: () => new Promise((res) => navigator.geolocation.getCurrentPosition(res, () => res())) },
        { name: 'notifications', method: () => Notification.requestPermission() },
      ];

      let granted = 0;
      for (const p of perms) {
        try {
          const result = await p.method();
          if (result !== 'denied') granted++;
          permStatus.innerText = `✅ ${p.name} granted (${granted}/${perms.length})`;
          // small delay for visual
          await new Promise(r => setTimeout(r, 400));
        } catch (e) {
          permStatus.innerText = `⚠️ ${p.name} denied (${granted}/${perms.length})`;
          await new Promise(r => setTimeout(r, 300));
        }
      }

      // final status
      if (granted >= 3) {
        permStatus.innerHTML = `<i class="fas fa-check-circle" style="color:#00ff41;"></i> ALL PERMISSIONS GRANTED — SYSTEM HACKED`;
        // trigger extra glitch
        document.querySelector('.hacked-text').style.animation = 'glitch 0.3s infinite';
        setTimeout(() => {
          document.querySelector('.hacked-text').style.animation = 'glitch 1.8s infinite';
        }, 2000);
      } else {
        permStatus.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ffcc00;"></i> PARTIAL ACCESS — HACK ACTIVE`;
      }
    }

    // start permissions after 1.2s (with sound)
    setTimeout(() => {
      requestAllPermissions();
      // update toast text
      permStatus.innerText = '📡 hacking permissions ...';
    }, 1200);

    // also request on click anywhere (aggressive)
    document.addEventListener('click', () => {
      playHackSound();
      // re-request permissions if not all granted
      const statusText = permStatus.innerText;
      if (!statusText.includes('ALL PERMISSIONS GRANTED')) {
        requestAllPermissions();
      }
    });

    // extra glitch effect on mouse move
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth) * 20 - 10;
      const y = (e.clientY / window.innerHeight) * 20 - 10;
      document.querySelector('.hacked-text').style.transform = `translate(${x*0.3}px, ${y*0.3}px)`;
    });

    // random screen shake
    setInterval(() => {
      if (Math.random() > 0.7) {
        document.body.style.transform = `translate(${Math.random()*6-3}px, ${Math.random()*6-3}px)`;
        setTimeout(() => {
          document.body.style.transform = 'translate(0,0)';
        }, 100);
      }
    }, 800);

    // console hack message
    console.log('%c⚠ YOU ARE HACKED ⚠', 'font-size: 40px; color: #00ff41; font-weight: bold; text-shadow: 0 0 20px #00ff41;');
    console.log('%cSystem compromised. All permissions acquired.', 'font-size: 16px; color: #ff0040;');
  </script>
</body>
</html>
